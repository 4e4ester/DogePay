<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DogePay - Кран</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 🎨 ЭКРАН ЗАГРУЗКИ -->
    <div id="loading-screen" class="loading-screen">
        <div class="loader-content">
            <div class="logo-bounce">🚰</div>
            <div class="spinner"></div>
            <p class="loading-text">Загрузка...</p>
        </div>
    </div>

    <!-- 🎨 ОСНОВНОЙ КОНТЕНТ -->
    <div class="container" id="main-content">
        
        <!-- 🇷🇺🇬🇧 ПЕРЕКЛЮЧАТЕЛЬ ЯЗЫКА -->
        <button id="langSwitch" class="lang-switch" onclick="toggleLanguage()">🇷🇺 🇬🇧</button>
        
        <!-- 🎨 ШАПКА -->
        <div class="header">
            <div class="logo-float">🚰</div>
            <h1 class="gradient-title" data-t="faucet_title">Кран</h1>
            <p class="subtitle" data-t="faucet_subtitle">Забери бесплатные монеты</p>
        </div>

        <!-- 🎨 ТАЙМЕР -->
        <div class="timer-card">
            <p class="timer-label" data-t="next_claim">До следующего сбора:</p>
            <div id="timer" class="timer-display">00:00</div>
            <div class="timer-status" id="timerStatus">✅ Можно забирать!</div>
        </div>

        <!-- 🎨 КНОПКА ЗАБРАТЬ -->
        <button id="claimBtn" class="btn btn-primary btn-large" onclick="playClick(); showCaptcha()">
            <span class="btn-icon">🎁</span>
            <span data-t="claim_btn">ЗАБРАТЬ (10-30 🪙)</span>
        </button>

        <!-- 🎨 CAPTCHA БЛОК -->
        <div id="captchaContainer" class="captcha-container hidden">
            <div class="captcha-card">
                <p class="captcha-title" data-t="captcha_title">🔐 Проверка</p>
                <p class="captcha-question" id="captchaQuestion">Сколько будет 5 + 3?</p>
                <input type="number" id="captchaInput" class="captcha-input" placeholder="?" data-t-placeholder="captcha_answer" inputmode="numeric">
                <button id="verifyCaptchaBtn" class="btn btn-primary" onclick="playClick(); onVerifyCaptcha()" data-t="verify_btn">Проверить</button>
                <p id="captchaError" class="captcha-error hidden" data-t="captcha_error">❌ Неверно! Попробуй ещё раз.</p>
            </div>
        </div>

        <!-- 🎨 ПОПАП НАГРАДЫ -->
        <div id="rewardPopup" class="reward-popup hidden">
            <div class="reward-content">
                <span class="reward-icon">🎉</span>
                <span class="reward-text" data-t="reward_text">+<span id="rewardAmount">0</span> 🪙</span>
            </div>
        </div>

        <!-- 🎨 ИНФО БЛОК -->
        <div class="info-box">
            <p data-t="faucet_info_1">💎 Награда: <strong>10-30 🪙</strong></p>
            <p data-t="faucet_info_2">⏰ Интервал: <strong>60 секунд</strong></p>
            <p data-t="faucet_info_3">🔐 CAPTCHA: защита от ботов</p>
        </div>

        <!-- 🎨 КНОПКА НАЗАД -->
        <a href="index.html" class="btn btn-secondary" onclick="playClick()">
            <span class="btn-icon">←</span>
            <span data-t="back_home">На главную</span>
        </a>

        <!-- 🎨 ФУТЕР -->
        <div class="footer">
            <p data-t="footer">🐕 DogePay • Кран</p>
        </div>
    </div>

    <script src="translations.js"></script>
    <script src="app.js"></script>
    <script>
        // ===== ЛОГИКА КРАНА (от DeepSeek) =====
        let currentCaptcha = { question: '', answer: 0 };
        let claimLock = false;
        let timerInterval = null;

        // Форматирование времени
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        // Запуск таймера
        function startTimer(endTimestamp) {
            const timerEl = document.getElementById('timer');
            const statusEl = document.getElementById('timerStatus');
            const claimBtn = document.getElementById('claimBtn');
            
            if (timerInterval) clearInterval(timerInterval);
            
            function update() {
                const now = Date.now();
                const diff = endTimestamp - now;
                
                if (diff <= 0) {
                    timerEl.textContent = '00:00';
                    statusEl.textContent = '✅ Можно забирать!';
                    statusEl.className = 'timer-status status-ready';
                    claimBtn.disabled = false;
                    claimBtn.classList.remove('disabled');
                    if (timerInterval) clearInterval(timerInterval);
                } else {
                    const secondsLeft = Math.ceil(diff / 1000);
                    timerEl.textContent = formatTime(secondsLeft);
                    statusEl.textContent = '⏳ Жди...';
                    statusEl.className = 'timer-status status-waiting';
                    claimBtn.disabled = true;
                    claimBtn.classList.add('disabled');
                }
            }
            update();
            timerInterval = setInterval(update, 1000);
        }

        // Генерация CAPTCHA
        function generateCaptcha() {
            const a = Math.floor(Math.random() * 10) + 1;
            const b = Math.floor(Math.random() * 10) + 1;
            const ops = ['+', '-', '*'];
            const op = ops[Math.floor(Math.random() * ops.length)];
            
            currentCaptcha.answer = op === '+' ? a + b : op === '-' ? a - b : a * b;
            currentCaptcha.question = `${a} ${op} ${b}`;
            
            document.getElementById('captchaQuestion').innerHTML = `Решите: <strong>${currentCaptcha.question} = ?</strong>`;
            document.getElementById('captchaInput').value = '';
            document.getElementById('captchaError').classList.add('hidden');
        }

        // Показать CAPTCHA
        function showCaptcha() {
            generateCaptcha();
            document.getElementById('captchaContainer').classList.remove('hidden');
            document.getElementById('claimBtn').classList.add('hidden');
            document.getElementById('captchaInput').focus();
        }

        // Скрыть CAPTCHA
        function hideCaptcha() {
            document.getElementById('captchaContainer').classList.add('hidden');
            document.getElementById('claimBtn').classList.remove('hidden');
        }

        // Показать награду
        function showReward(amount) {
            const popup = document.getElementById('rewardPopup');
            const amountEl = document.getElementById('rewardAmount');
            amountEl.textContent = amount;
            popup.classList.remove('hidden');
            
            // Анимация
            popup.style.animation = 'none';
            popup.offsetHeight; // reflow
            popup.style.animation = 'rewardPop 0.5s ease forwards';
            
            setTimeout(() => {
                popup.classList.add('hidden');
            }, 2500);
        }

        // Запрос к серверу
        async function claimReward() {
            if (claimLock) return;
            claimLock = true;

            try {
                const userId = window.Telegram?.WebApp?.initDataUnsafe?.user?.id;
                const username = window.Telegram?.WebApp?.initDataUnsafe?.user?.username || '';
                
                const res = await fetch('/api/claim', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId, username })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    // Звук + вибрация
                    if (window.playClaim) playClaim();
                    if (window.Telegram?.WebApp?.HapticFeedback) {
                        window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
                    }
                    
                    // Показать награду
                    showReward(data.reward);
                    
                    // Обновить баланс
                    if (window.updateBalance) updateBalance();
                    
                    // Сохранить и запустить таймер
                    localStorage.setItem('lastClaim', data.nextClaimTime);
                    startTimer(data.nextClaimTime);
                    
                } else if (data.error?.includes('Подождите') || data.waitTime) {
                    const waitTime = data.waitTime || 60000;
                    const nextClaim = Date.now() + waitTime;
                    localStorage.setItem('lastClaim', nextClaim);
                    startTimer(nextClaim);
                } else {
                    alert(data.error || '❌ Ошибка');
                }
            } catch (err) {
                console.error('Claim error:', err);
                alert('🌐 Сетевая ошибка. Проверь соединение.');
            } finally {
                claimLock = false;
                hideCaptcha();
            }
        }

        // Проверка CAPTCHA
        function onVerifyCaptcha() {
            const userAnswer = parseInt(document.getElementById('captchaInput').value, 10);
            
            if (isNaN(userAnswer) || userAnswer !== currentCaptcha.answer) {
                const errorEl = document.getElementById('captchaError');
                errorEl.classList.remove('hidden');
                errorEl.style.animation = 'shake 0.3s ease';
                generateCaptcha();
                return;
            }
            
            // CAPTCHA пройдена → забрать награду
            claimReward();
        }

        // Enter в поле CAPTCHA
        document.getElementById('captchaInput')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') onVerifyCaptcha();
        });

        // Инициализация
        document.addEventListener('DOMContentLoaded', () => {
            // Скрыть загрузку
            setTimeout(() => {
                const loading = document.getElementById('loading-screen');
                const main = document.getElementById('main-content');
                if (loading) loading.classList.add('hidden');
                if (main) {
                    main.style.display = 'block';
                    main.classList.add('fade-in');
                }
                if (window.initApp) window.initApp();
                
                // Проверить таймер
                const lastClaim = localStorage.getItem('lastClaim');
                if (lastClaim && Date.now() < parseInt(lastClaim)) {
                    startTimer(parseInt(lastClaim));
                }
            }, 1500);
        });

        // Очистка таймера при уходе со страницы
        window.addEventListener('beforeunload', () => {
            if (timerInterval) clearInterval(timerInterval);
        });
    </script>
</body>
</html>
