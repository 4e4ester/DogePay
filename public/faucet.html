<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🚰 Кран - DogePay</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <button id="langSwitch" class="lang-switch" onclick="toggleLanguage()">🇷🇺 🇬🇧</button>
        
        <div class="header">
            <div class="logo">🚰</div>
            <h1 class="gradient-text" data-t="faucet_title">Кран</h1>
            <p class="subtitle" data-t="faucet_subtitle">Забери бесплатные монеты</p>
        </div>

        <div id="rewardPopup" class="reward-popup hidden">
            <span data-t="success_claim">🎉 +</span><span id="rewardAmount">0</span> <span data-t="coins">🪙</span>
        </div>

        <div class="form-card">
            <p class="timer" id="timer" data-t="faucet_checking">⏳ Проверка...</p>
            
            <button id="claimBtn" class="btn btn-primary" style="width: 100%;">
                <span data-t="faucet_claim">ЗАБРАТЬ (10-50 🪙)</span>
            </button>
            
            <p style="color: var(--text-secondary); font-size: 13px; margin-top: 15px; text-align: center;" data-t="faucet_timer">
                ⏰ Доступно каждые 3 часа
            </p>
        </div>

        <div class="info-box">
            <p data-t="faucet_info">Каждая награда: 10-50 🪙
Следующий сбор: через 3 часа</p>
        </div>

        <div class="footer">
            <p>🐕 DogePay • <span data-t="nav_faucet">Кран</span></p>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <span class="nav-icon">🏠</span>
            <span data-t="nav_home">Главная</span>
        </a>
        <a href="faucet.html" class="nav-item active">
            <span class="nav-icon">🚰</span>
            <span data-t="nav_faucet">Кран</span>
        </a>
        <a href="deposit.html" class="nav-item">
            <span class="nav-icon">💰</span>
            <span data-t="nav_deposit">Ввод</span>
        </a>
        <a href="withdraw.html" class="nav-item">
            <span class="nav-icon">💸</span>
            <span data-t="nav_withdraw">Вывод</span>
        </a>
        <a href="admin.html" class="nav-item">
            <span class="nav-icon">🔐</span>
            <span data-t="nav_admin">Админ</span>
        </a>
    </nav>

    <script src="translations.js"></script>
    <script src="app.js"></script>
    <script>
        const timerEl = document.getElementById('timer');
        const claimBtn = document.getElementById('claimBtn');
        const rewardPopup = document.getElementById('rewardPopup');
        const rewardAmount = document.getElementById('rewardAmount');

        function formatTime(ms) {
            const totalSec = Math.max(0, Math.floor(ms / 1000));
            const h = Math.floor(totalSec / 3600);
            const m = Math.floor((totalSec % 3600) / 60);
            const s = totalSec % 60;
            return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        }

        async function handleClaim() {
            if (!userId) {
                showMessage(t('error_user'), 'error');
                return;
            }

            claimBtn.disabled = true;
            claimBtn.innerHTML = `<span data-t="faucet_processing">⏳ Обработка...</span>`;

            try {
                const res = await fetch('/api/claim', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId })
                });
                const data = await res.json();

                if (data.success) {
                    playClaim();
                    rewardAmount.innerText = data.reward;
                    rewardPopup.classList.remove('hidden');
                    claimBtn.disabled = true;
                    claimBtn.innerHTML = `<span data-t="faucet_next">⏰ Следующий сбор через 3ч</span>`;
                    timerEl.innerText = '⏰ ' + t('timer_started');
                    if (window.updateBalance) window.updateBalance();
                    setTimeout(() => {
                        rewardPopup.classList.add('hidden');
                        startTimer(3 * 60 * 60 * 1000);
                    }, 3000);
                } else {
                    const hours = Math.ceil(data.waitTime / 1000 / 3600) || 3;
                    timerEl.innerText = `⏰ ${t('msg_wait')} ${hours} ${t('msg_hours')}.`;
                    claimBtn.disabled = true;
                    claimBtn.innerHTML = `<span data-t="faucet_wait">⏳ Жди</span>`;
                    if (data.waitTime) startTimer(data.waitTime);
                }
            } catch (err) {
                showMessage(t('error_network'), 'error');
                claimBtn.disabled = false;
                claimBtn.innerHTML = `<span data-t="faucet_claim">ЗАБРАТЬ (10-50 🪙)</span>`;
            }
        }

        function startTimer(ms) {
            let remaining = ms;
            timerEl.innerText = `⏰ ${formatTime(remaining)}`;
            const interval = setInterval(() => {
                remaining -= 1000;
                if (remaining <= 0) {
                    clearInterval(interval);
                    timerEl.innerText = t('faucet_available');
                    claimBtn.disabled = false;
                    claimBtn.innerHTML = `<span data-t="faucet_claim">ЗАБРАТЬ (10-50 🪙)</span>`;
                    return;
                }
                timerEl.innerText = `⏰ ${formatTime(remaining)}`;
            }, 1000);
        }

        claimBtn.addEventListener('click', handleClaim);

        if (userId) {
            handleClaim();
        } else {
            timerEl.innerText = t('error_user');
            claimBtn.disabled = true;
        }
    </script>
</body>
</html>
