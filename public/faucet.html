<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DogePay - Кран</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- ЭКРАН ЗАГРУЗКИ -->
    <div id="loading-screen" class="loading-screen">
        <div class="loader-content">
            <div class="logo-bounce">🚰</div>
            <div class="spinner"></div>
            <p class="loading-text">Загрузка...</p>
        </div>
    </div>

    <!-- ОСНОВНОЙ КОНТЕНТ -->
    <div class="container" id="main-content">
        
        <!-- ПЕРЕКЛЮЧАТЕЛЬ ЯЗЫКА -->
        <button id="langSwitch" class="lang-switch" onclick="toggleLanguage()">🇷🇺 🇬🇧</button>
        
        <!-- ШАПКА -->
        <div class="header">
            <div class="logo-float">🚰</div>
            <h1 class="gradient-title">Кран</h1>
            <p class="subtitle">Забери бесплатные монеты</p>
        </div>

        <!-- ТАЙМЕР -->
        <div class="timer-card">
            <p class="timer-label">До следующего сбора:</p>
            <div id="timer" class="timer-display">00:00</div>
            <div id="timer-status" class="timer-status status-ready">✅ Можно забирать!</div>
        </div>

        <!-- КНОПКА ЗАБРАТЬ -->
        <button id="claimBtn" class="btn btn-primary btn-large" onclick="playClick(); showCaptcha()">
            <span class="btn-icon">🎁</span>
            <span>ЗАБРАТЬ (10-30 🪙)</span>
        </button>

        <!-- CAPTCHA БЛОК -->
        <div id="captchaContainer" class="captcha-container hidden">
            <div class="captcha-card">
                <p class="captcha-title">🔐 Проверка</p>
                <p class="captcha-question" id="captchaQuestion">Сколько будет 5 + 3?</p>
                <input type="number" id="captchaInput" class="captcha-input" placeholder="?" inputmode="numeric">
                <button id="verifyCaptchaBtn" class="btn btn-primary" onclick="onVerifyCaptcha()">Проверить</button>
                <p id="captchaError" class="captcha-error hidden">❌ Неверно! Попробуй ещё раз.</p>
            </div>
        </div>

        <!-- ПОПАП НАГРАДЫ -->
        <div id="rewardPopup" class="reward-popup hidden">
            <div class="reward-content">
                <span class="reward-icon">🎉</span>
                <span class="reward-text">+<span id="rewardAmount">0</span> 🪙</span>
            </div>
        </div>

        <!-- ИНФО БЛОК -->
        <div class="info-box">
            <p>💎 Награда: <strong>10-30 🪙</strong></p>
            <p>⏰ Интервал: <strong>60 секунд</strong></p>
            <p>🔐 CAPTCHA: защита от ботов</p>
        </div>

        <!-- КНОПКА НАЗАД -->
        <a href="index.html" class="btn btn-secondary" onclick="playClick()">
            <span class="btn-icon">←</span>
            <span>На главную</span>
        </a>

        <!-- ФУТЕР -->
        <div class="footer">
            <p>🐕 DogePay • Кран</p>
        </div>
    </div>

    <script src="translations.js"></script>
    <script src="app.js"></script>
    <script>
        // ===== ЛОГИКА КРАНА =====
        let currentCaptcha = { answer: 0 };
        let claimLock = false;
        let timerInterval = null;

        // Получение user_id
        function getUserId() {
            const tg = window.Telegram?.WebApp;
            if (tg?.initDataUnsafe?.user?.id) {
                return tg.initDataUnsafe.user.id;
            }
            // Fallback для тестов
            return 123456;
        }

        // Форматирование времени
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        // Запуск таймера
        function startTimer(endTimestamp) {
            const timerEl = document.getElementById('timer');
            const statusEl = document.getElementById('timer-status');
            const claimBtn = document.getElementById('claimBtn');
            
            if (timerInterval) clearInterval(timerInterval);
            
            function update() {
                const now = Date.now();
                const diff = endTimestamp - now;
                
                if (diff <= 0) {
                    timerEl.textContent = '00:00';
                    statusEl.textContent = '✅ Можно забирать!';
                    statusEl.className = 'timer-status status-ready';
                    claimBtn.disabled = false;
                    claimBtn.classList.remove('disabled');
                    if (timerInterval) clearInterval(timerInterval);
                } else {
                    const secondsLeft = Math.ceil(diff / 1000);
                    timerEl.textContent = formatTime(secondsLeft);
                    statusEl.textContent = '⏳ Жди...';
                    statusEl.className = 'timer-status status-waiting';
                    claimBtn.disabled = true;
                    claimBtn.classList.add('disabled');
                }
            }
            update();
            timerInterval = setInterval(update, 1000);
        }

        // Генерация CAPTCHA
        function generateCaptcha() {
            const a = Math.floor(Math.random() * 10) + 1;
            const b = Math.floor(Math.random() * 10) + 1;
            const ops = ['+', '-'];
            const op = ops[Math.floor(Math.random() * ops.length)];
            
            currentCaptcha.answer = op === '+' ? a + b : a - b;
            currentCaptcha.question = `${a} ${op} ${b}`;
            
            document.getElementById('captchaQuestion').innerHTML = `Решите: <strong>${currentCaptcha.question} = ?</strong>`;
            document.getElementById('captchaInput').value = '';
            document.getElementById('captchaError').classList.add('hidden');
        }

        // Показать CAPTCHA
        function showCaptcha() {
            generateCaptcha();
            document.getElementById('captchaContainer').classList.remove('hidden');
            document.getElementById('claimBtn').classList.add('hidden');
            document.getElementById('captchaInput').focus();
        }

        // Скрыть CAPTCHA
        function hideCaptcha() {
            document.getElementById('captchaContainer').classList.add('hidden');
            document.getElementById('claimBtn').classList.remove('hidden');
        }

        // Показать награду
        function showReward(amount) {
            const popup = document.getElementById('rewardPopup');
            const amountEl = document.getElementById('rewardAmount');
            amountEl.textContent = amount;
            popup.classList.remove('hidden');
            
            popup.style.animation = 'none';
            popup.offsetHeight;
            popup.style.animation = 'rewardPop 0.5s ease forwards';
            
            setTimeout(() => {
                popup.classList.add('hidden');
            }, 2500);
        }

        // Показать тост
        function showToast(message, type = 'info') {
            if (window.showToast) {
                window.showToast(message, type);
                return;
            }
            
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `<span class="toast-text">${message}</span>`;
            document.body.appendChild(toast);
            
            requestAnimationFrame(() => toast.classList.add('toast-show'));
            
            setTimeout(() => {
                toast.classList.remove('toast-show');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Запрос к API
        async function claimReward() {
            if (claimLock) return;
            claimLock = true;

            const userId = getUserId();
            console.log('🚰 Claim request - User ID:', userId);

            try {
                const res = await fetch('/api/claim', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ 
                        user_id: userId,
                        username: window.Telegram?.WebApp?.initDataUnsafe?.user?.username || ''
                    })
                });

                console.log('📡 Response status:', res.status);
                
                if (!res.ok) {
                    throw new Error(`HTTP ${res.status}: ${res.statusText}`);
                }
                
                const data = await res.json();
                console.log('📦 Response data:', data);
                
                if (data.success) {
                    // Успех!
                    const reward = data.reward || data.amount;
                    
                    console.log('✅ Reward:', reward);
                    
                    // Звук + вибрация
                    if (window.playClaim) playClaim();
                    if (window.Telegram?.WebApp?.HapticFeedback) {
                        window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
                    }
                    
                    // Показать награду
                    showReward(reward);
                    
                    // Обновить баланс
                    if (window.updateBalance) await window.updateBalance();
                    if (window.addBalance) window.addBalance(reward);
                    
                    // Сохранить и запустить таймер
                    const nextClaim = data.nextClaimTime || (Date.now() + 60000);
                    localStorage.setItem('lastClaim', nextClaim.toString());
                    startTimer(nextClaim);
                    
                    showToast(`✅ +${reward} 🪙`, 'success');
                    
                } else if (data.error?.includes('Подождите') || data.waitTime) {
                    // Уже собрано
                    const waitTime = data.waitTime || 60000;
                    const nextClaim = Date.now() + waitTime;
                    localStorage.setItem('lastClaim', nextClaim.toString());
                    startTimer(nextClaim);
                    showToast('⏳ ' + (data.error || 'Подождите'), 'info');
                    
                } else {
                    // Другая ошибка
                    const errorMsg = data.error || 'Неизвестная ошибка';
                    console.error('❌ API error:', errorMsg);
                    showToast('❌ ' + errorMsg, 'error');
                    if (window.playError) window.playError();
                }
                
            } catch (err) {
                console.error('🌐 Network error:', err);
                console.error('Full error:', err.message);
                
                // Показываем детальную ошибку
                let errorMsg = '🌐 Ошибка сети';
                if (err.message.includes('Failed to fetch')) {
                    errorMsg = '❌ Не удалось подключиться к серверу. Проверь интернет.';
                } else if (err.message.includes('404')) {
                    errorMsg = '❌ API endpoint не найден (/api/claim)';
                } else if (err.message.includes('500')) {
                    errorMsg = '❌ Ошибка сервера. Попробуй позже.';
                }
                
                showToast(errorMsg, 'error');
                if (window.playError) window.playError();
            } finally {
                claimLock = false;
                hideCaptcha();
            }
        }

        // Проверка CAPTCHA
        function onVerifyCaptcha() {
            const userAnswer = parseInt(document.getElementById('captchaInput').value, 10);
            
            if (isNaN(userAnswer)) {
                document.getElementById('captchaError').textContent = '❌ Введите число';
                document.getElementById('captchaError').classList.remove('hidden');
                return;
            }
            
            if (userAnswer !== currentCaptcha.answer) {
                const errorEl = document.getElementById('captchaError');
                errorEl.textContent = '❌ Неверно! Попробуй ещё раз.';
                errorEl.classList.remove('hidden');
                errorEl.style.animation = 'shake 0.3s ease';
                setTimeout(() => errorEl.style.animation = '', 300);
                generateCaptcha();
                return;
            }
            
            // CAPTCHA пройдена → забрать награду
            claimReward();
        }

        // Enter в поле CAPTCHA
        document.getElementById('captchaInput')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') onVerifyCaptcha();
        });

        // Инициализация
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const loading = document.getElementById('loading-screen');
                const main = document.getElementById('main-content');
                
                if (loading) loading.classList.add('hidden');
                if (main) {
                    main.style.display = 'block';
                    main.classList.add('fade-in');
                }
                if (window.initApp) window.initApp();
                
                // Проверить таймер
                const lastClaim = localStorage.getItem('lastClaim');
                console.log('🕐 Last claim:', lastClaim);
                
                if (lastClaim && Date.now() < parseInt(lastClaim)) {
                    startTimer(parseInt(lastClaim));
                } else {
                    console.log('✅ Faucet ready!');
                }
            }, 1500);
        });

        // Очистка таймера
        window.addEventListener('beforeunload', () => {
            if (timerInterval) clearInterval(timerInterval);
        });
    </script>
</body>
</html>
