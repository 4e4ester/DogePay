<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🚰 Кран - DogePay</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        .lang-switch {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 10px 16px;
            color: var(--gold);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .lang-switch:hover {
            border-color: var(--gold);
            transform: scale(1.05);
        }
        .reward-popup {
            text-align: center;
            font-size: 36px;
            font-weight: 800;
            color: #00d68f;
            margin: 25px 0;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-shadow: 0 4px 30px rgba(0, 214, 143, 0.5);
        }
        @keyframes popIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); opacity: 1; }
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Language Switch -->
        <button id="langSwitch" class="lang-switch" onclick="toggleLanguage()">🇬🇧 EN</button>
        
        <!-- Header -->
        <div class="header">
            <h1 data-t="faucet_title">🚰 Кран</h1>
            <p class="subtitle" data-t="faucet_subtitle">Забери бесплатные монеты</p>
        </div>

        <!-- Reward Display -->
        <div id="rewardPopup" class="reward-popup hidden">
            <span data-t="success_claim">🎉 +</span><span id="rewardAmount">0</span> <span data-t="coins">🪙</span>
        </div>

        <!-- Timer / Button Card -->
        <div class="balance-card">
            <p class="timer" id="timer" data-t="faucet_checking">⏳ Проверка...</p>
            
            <button id="claimBtn" class="btn btn-primary" style="width: 100%; margin-top: 15px;">
                <span data-t="faucet_claim">🎁 ЗАБРАТЬ (10-50 🪙)</span>
            </button>
            
            <p style="color: var(--text-secondary); font-size: 13px; margin-top: 15px; text-align: center;" data-t="faucet_timer">
                ⏰ Доступно каждые 3 часа
            </p>
        </div>

        <!-- Info -->
        <div class="form-card">
            <p class="text-center" style="color: var(--text-secondary); font-size: 14px; white-space: pre-line;" data-t="faucet_info">
                💎 Каждая награда: 10-50 🪙
                🔄 Следующий сбор: через 3 часа
            </p>
        </div>

        <!-- Back Button -->
        <a href="index.html" class="btn btn-secondary" style="width: 100%;">
            <span data-t="btn_back">← Назад</span>
        </a>

        <!-- Footer -->
        <div class="footer">
            <p>🐕 DogePay • <span data-t="faucet_title">Кран</span></p>
        </div>
    </div>

    <script src="translations.js"></script>
    <script src="app.js"></script>
    <script>
        // ============================================
        // FAUCET LOGIC (FIXED)
        // ============================================
        
        const timerEl = document.getElementById('timer');
        const claimBtn = document.getElementById('claimBtn');
        const rewardPopup = document.getElementById('rewardPopup');
        const rewardAmount = document.getElementById('rewardAmount');

        // Форматирование времени
        function formatTime(ms) {
            const totalSec = Math.max(0, Math.floor(ms / 1000));
            const h = Math.floor(totalSec / 3600);
            const m = Math.floor((totalSec % 3600) / 60);
            const s = totalSec % 60;
            return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        }

        // Проверка и сбор награды
        async function handleClaim() {
            if (!userId) {
                showMessage(t('error_user'), 'error');
                return;
            }

            claimBtn.disabled = true;
            claimBtn.innerHTML = `<span data-t="faucet_processing">⏳ Обработка...</span>`;

            try {
                const res = await fetch('/api/claim', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId })
                });
                const data = await res.json();

                if (data.success) {
                    // Успех!
                    rewardAmount.innerText = data.reward;
                    rewardPopup.classList.remove('hidden');
                    
                    claimBtn.disabled = true;
                    claimBtn.innerHTML = `<span data-t="faucet_next">⏰ Следующий сбор через 3ч</span>`;
                    timerEl.innerText = '⏰ ' + t('timer_started');
                    
                    // Обновить баланс
                    if (window.updateBalance) window.updateBalance();
                    
                    // Скрыть попап через 3 секунды
                    setTimeout(() => {
                        rewardPopup.classList.add('hidden');
                        startTimer(3 * 60 * 60 * 1000);
                    }, 3000);
                    
                } else {
                    // Ещё рано
                    const hours = Math.ceil(data.waitTime / 1000 / 3600) || 3;
                    timerEl.innerText = `⏰ ${t('msg_wait')} ${hours} ${t('msg_hours')}.`;
                    claimBtn.disabled = true;
                    claimBtn.innerHTML = `<span data-t="faucet_wait">⏳ Жди</span>`;
                    
                    if (data.waitTime) {
                        startTimer(data.waitTime);
                    }
                }
            } catch (err) {
                showMessage(t('error_network'), 'error');
                claimBtn.disabled = false;
                claimBtn.innerHTML = `<span data-t="faucet_claim">🎁 ЗАБРАТЬ (10-50 🪙)</span>`;
            }
        }

        // Таймер обратного отсчёта
        function startTimer(ms) {
            let remaining = ms;
            timerEl.innerText = `⏰ ${formatTime(remaining)}`;
            
            const interval = setInterval(() => {
                remaining -= 1000;
                if (remaining <= 0) {
                    clearInterval(interval);
                    timerEl.innerText = t('faucet_available');
                    claimBtn.disabled = false;
                    claimBtn.innerHTML = `<span data-t="faucet_claim">🎁 ЗАБРАТЬ (10-50 🪙)</span>`;
                    return;
                }
                timerEl.innerText = `⏰ ${formatTime(remaining)}`;
            }, 1000);
        }

        // Обработчик кнопки
        claimBtn.addEventListener('click', handleClaim);

        // Проверка при загрузке
        if (userId) {
            handleClaim();
        } else {
            timerEl.innerText = t('error_user');
            claimBtn.disabled = true;
        }
    </script>
</body>
</html>
