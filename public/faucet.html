<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🚰 Кран - DogePay</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- НЕТ ФЛАГОВ -->
        
        <div class="header">
            <div class="logo">🚰</div>
            <h1 class="gradient-text">Кран</h1>
            <p class="subtitle">Забери бесплатные монеты</p>
        </div>

        <div id="rewardPopup" class="reward-popup hidden">
            🎉 +<span id="rewardAmount">0</span> 🪙
        </div>

        <div class="form-card">
            <p class="timer" id="timer">⏳ Проверка...</p>
            
            <button id="claimBtn" class="btn btn-primary" style="width: 100%;">
                ЗАБРАТЬ (10-50 🪙)
            </button>
            
            <p style="color: var(--text-secondary); font-size: 13px; margin-top: 15px; text-align: center;">
                ⏰ Доступно каждые 3 часа
            </p>
        </div>

        <div class="info-box">
            <p>💎 Каждая награда: 10-50 🪙</p>
            <p>🔄 Следующий сбор: через 3 часа</p>
        </div>

        <div class="footer">
            <p>🐕 DogePay • Кран</p>
        </div>
    </div>

    <!-- НИЖНЕЕ МЕНЮ (3 КНОПКИ) -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <span class="nav-icon">🏠</span>
            <span>Главная</span>
        </a>
        <a href="faucet.html" class="nav-item active">
            <span class="nav-icon">🚰</span>
            <span>Кран</span>
        </a>
        <a href="withdraw.html" class="nav-item">
            <span class="nav-icon">💸</span>
            <span>Вывод</span>
        </a>
    </nav>

    <script src="app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const userId = tg.initDataUnsafe?.user?.id;

        const timerEl = document.getElementById('timer');
        const claimBtn = document.getElementById('claimBtn');
        const rewardPopup = document.getElementById('rewardPopup');
        const rewardAmount = document.getElementById('rewardAmount');

        function formatTime(ms) {
            const totalSec = Math.max(0, Math.floor(ms / 1000));
            const h = Math.floor(totalSec / 3600);
            const m = Math.floor((totalSec % 3600) / 60);
            const s = totalSec % 60;
            return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        }

        async function handleClaim() {
            if (!userId) {
                showMessage('❌ Пользователь не найден', 'error');
                return;
            }

            claimBtn.disabled = true;
            claimBtn.innerHTML = '⏳ Обработка...';

            try {
                const res = await fetch('/api/claim', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId })
                });
                const data = await res.json();

                if (data.success) {
                    playClaim();
                    rewardAmount.innerText = data.reward;
                    rewardPopup.classList.remove('hidden');
                    claimBtn.disabled = true;
                    claimBtn.innerHTML = '⏰ Следующий сбор через 3ч';
                    timerEl.innerText = '⏰ Таймер запущен';
                    if (window.updateBalance) window.updateBalance();
                    setTimeout(() => {
                        rewardPopup.classList.add('hidden');
                        startTimer(3 * 60 * 60 * 1000);
                    }, 3000);
                } else {
                    const hours = Math.ceil(data.waitTime / 1000 / 3600) || 3;
                    timerEl.innerText = `⏰ Подожди ещё ${hours} ч.`;
                    claimBtn.disabled = true;
                    claimBtn.innerHTML = '⏳ Жди';
                    if (data.waitTime) startTimer(data.waitTime);
                }
            } catch (err) {
                showMessage('❌ Ошибка сети', 'error');
                claimBtn.disabled = false;
                claimBtn.innerHTML = 'ЗАБРАТЬ (10-50 🪙)';
            }
        }

        function startTimer(ms) {
            let remaining = ms;
            timerEl.innerText = `⏰ ${formatTime(remaining)}`;
            const interval = setInterval(() => {
                remaining -= 1000;
                if (remaining <= 0) {
                    clearInterval(interval);
                    timerEl.innerText = '✅ Можно забирать!';
                    claimBtn.disabled = false;
                    claimBtn.innerHTML = 'ЗАБРАТЬ (10-50 🪙)';
                    return;
                }
                timerEl.innerText = `⏰ ${formatTime(remaining)}`;
            }, 1000);
        }

        claimBtn.addEventListener('click', handleClaim);

        if (userId) {
            handleClaim();
        } else {
            timerEl.innerText = '❌ Пользователь не найден';
            claimBtn.disabled = true;
        }
    </script>
</body>
</html>
