<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DogePay</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- ЭКРАН ЗАГРУЗКИ -->
    <div id="loading-screen" class="loading-screen">
        <div class="loader-content">
            <div class="logo-bounce">🐕</div>
            <div class="spinner"></div>
            <p class="loading-text">Загрузка...</p>
        </div>
    </div>

    <!-- ОСНОВНОЙ КОНТЕНТ -->
    <div class="container" id="main-content">
        
        <!-- ПЕРЕКЛЮЧАТЕЛЬ ЯЗЫКА -->
        <button id="langSwitch" class="lang-switch" onclick="toggleLanguage()">🇷🇺 🇬🇧</button>
        
        <!-- ШАПКА -->
        <div class="header">
            <div class="logo-float">🐕</div>
            <h1 class="gradient-title">DogePay</h1>
            <p class="subtitle" data-t="subtitle">Зарабатывай DOGE играя</p>
        </div>

        <!-- КАРТОЧКА БАЛАНСА -->
        <div class="balance-card">
            <p class="balance-label" data-t="balance_label">Твой баланс</p>
            <div class="balance-main">
                <span class="coin-icon">🪙</span>
                <span id="balance" class="balance-number">0</span>
            </div>
            <p class="balance-doge">
                <span id="balance-doge-prefix">🐕 ~</span>
                <span id="balance-doge">0.0000</span>
                <span id="balance-doge-suffix">DOGE</span>
            </p>
        </div>

        <!-- КНОПКИ (ИСПРАВЛЕНО - БЕЗ ДУБЛЕЙ!) -->
        <div class="buttons-grid">
            <a href="faucet.html" class="btn btn-primary" onclick="playClick()">
                <span class="btn-icon">🚰</span>
                <span>Faucet</span>
            </a>
            <a href="ads.html" class="btn btn-primary" onclick="playClick()">
                <span class="btn-icon">📢</span>
                <span>Ads</span>
            </a>
            <a href="withdraw.html" class="btn btn-secondary" onclick="playClick()">
                <span class="btn-icon">💸</span>
                <span>Withdraw</span>
            </a>
        </div>

        <!-- ФУТЕР -->
        <div class="footer">
            <p>🔐 Безопасно • ⚡ Быстро • 🌍 Глобально</p>
        </div>
    </div>

    <script src="translations.js"></script>
    <script src="app.js"></script>
    <script>
        // Инициализация после загрузки
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const loading = document.getElementById('loading-screen');
                const main = document.getElementById('main-content');
                if (loading) loading.classList.add('hidden');
                if (main) {
                    main.style.display = 'block';
                    main.classList.add('fade-in');
                }
                if (window.initApp) window.initApp();
            }, 1500);
        });
    </script>
</body>
</html>
