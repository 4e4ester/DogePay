<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DogePay - Зарабатывай DOGE</title>
    
    <!-- Telegram WebApp -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- ЭКРАН ЗАГРУЗКИ -->
    <div id="loadingScreen" class="loading-screen">
        <div class="loading-content">
            <div class="loading-logo">🐕</div>
            <div class="loading-spinner"></div>
            <p id="loadingText" class="loading-text">Загрузка DogePay...</p>
        </div>
    </div>

    <!-- Основной контент -->
    <div class="container" id="mainContent" style="display: none;">
        
        <!-- Переключатель языка -->
        <button id="langSwitch" class="lang-switch" onclick="toggleLanguage()">
            🇷🇺 🇬🇧
        </button>

        <div class="header">
            <div class="logo">🐕</div>
            <h1 class="gradient-text" data-translate="appTitle">DogePay</h1>
            <p class="subtitle" data-translate="subtitle">Зарабатывай DOGE играя</p>
        </div>

        <div class="balance-card">
            <p class="balance-label" data-translate="yourBalance">Твой баланс</p>
            <div class="balance-main">
                <span id="balance">0.00000000</span> <span class="coin">🪙</span>
            </div>
            <p class="balance-doge">
                ~<span id="balanceDoge">0.00000000</span> DOGE
            </p>
        </div>

        <div class="buttons-grid">
            <a href="faucet.html" class="btn btn-primary">
                <span class="btn-icon">🚰</span>
                <span data-translate="faucet">Кран</span>
            </a>
            <a href="ads.html" class="btn btn-primary">
                <span class="btn-icon">📢</span>
                <span data-translate="ads">Реклама</span>
            </a>
            <a href="withdraw.html" class="btn btn-secondary">
                <span class="btn-icon">💸</span>
                <span data-translate="withdraw">Вывод</span>
            </a>
        </div>

        <div class="footer">
            <p data-translate="footer">🔐 Безопасно • ⚡ Быстро • 🌍 Глобально</p>
        </div>
    </div>

    <!-- Звуки -->
    <audio id="clickSound" src="click.mp3" preload="auto"></audio>
    <audio id="claimSound" src="claim.mp3" preload="auto"></audio>

    <script src="translations.js"></script>
    <script src="app.js"></script>
</body>
</html>
