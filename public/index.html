<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🐕 DogePay</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Language Switch -->
        <button id="langSwitch" class="lang-switch" onclick="toggleLanguage()">🇷🇺 | 🇬🇧</button>
        
        <!-- Header -->
        <div class="header">
            <h1 data-t="app_name">🐕 DogePay</h1>
            <p class="subtitle" data-t="subtitle">Зарабатывай DOGE играя</p>
        </div>

        <!-- Balance Card -->
        <div class="balance-card float">
            <p class="balance-label" data-t="balance_label">Твой баланс</p>
            <div class="balance-main"><span data-t="balance_coins">🪙</span> <span id="balance">0</span></div>
            <p class="balance-doge"><span data-t="balance_doge">🐕 ~</span><span id="balance-doge">0.0000</span> <span data-t="balance_doge_suffix">DOGE</span></p>
        </div>

        <!-- Action Buttons -->
        <div class="buttons-grid">
            <a href="faucet.html" class="btn btn-primary">
                <span class="btn-icon">🚰</span>
                <span data-t="btn_faucet">Кран</span>
            </a>
            <a href="deposit.html" class="btn btn-secondary">
                <span class="btn-icon">💰</span>
                <span data-t="btn_deposit">Ввод средств</span>
            </a>
            <a href="withdraw.html" class="btn btn-secondary">
                <span class="btn-icon">💸</span>
                <span data-t="btn_withdraw">Вывод DOGE</span>
            </a>
        </div>

        <!-- Info Card -->
        <div class="form-card">
            <p class="text-center" style="color: var(--text-secondary); font-size: 14px;">
                💡 <strong data-t="how_it_works">Как работает:</strong><br>
                <span data-t="how_it_works_desc">Забирай монеты с крана каждые 3 часа,<br>копи на вывод или покупай за реальные DOGE.</span>
            </p>
        </div>

        <!-- Footer -->
        <div class="footer">
            <p data-t="footer">🔐 Безопасно • ⚡ Быстро • 🌍 Глобально</p>
        </div>
    </div>

    <script src="translations.js"></script>
    <script src="app.js"></script>
</body>
</html>
