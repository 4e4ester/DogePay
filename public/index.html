<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DogePay</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- ФЛАГИ (ЛЕВЫЙ ВЕРХНИЙ УГОЛ) -->
        <button id="langSwitch" class="lang-switch" onclick="toggleLanguage()">🇷🇺 🇬🇧</button>
        
        <div class="header">
            <div class="logo">🐕</div>
            <h1 class="gradient-text">DogePay</h1>
            <p class="subtitle">Зарабатывай DOGE играя</p>
        </div>

        <div class="balance-card">
            <p class="balance-label">Твой баланс</p>
            <div class="balance-main">
                <span id="balance">0</span> 🪙
            </div>
            <p class="balance-doge">~<span id="balance-doge">0.0000</span> DOGE</p>
        </div>

        <!-- 3 КНОПКИ (1 ИКОНКА) -->
        <div class="buttons-grid">
            <a href="faucet.html" class="btn btn-primary">
                <span class="btn-icon">🚰</span>
                <span>Кран</span>
            </a>
            <a href="ads.html" class="btn btn-primary">
                <span class="btn-icon">📢</span>
                <span>Реклама</span>
            </a>
            <a href="withdraw.html" class="btn btn-secondary">
                <span class="btn-icon">💸</span>
                <span>Вывод</span>
            </a>
        </div>

        <div class="footer">
            <p>🔐 Безопасно • ⚡ Быстро • 🌍 Глобально</p>
        </div>
    </div>

    <script src="translations.js"></script>
    <script src="app.js"></script>
</body>
</html>
