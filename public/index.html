<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DogePay - Earn Free DOGE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- LOADING SCREEN -->
    <div id="loadingScreen" class="loading-screen">
        <div class="loading-content">
            <div class="loading-logo">🐕</div>
            <div class="loading-spinner"></div>
            <p id="loadingText" class="loading-text">Загрузка DogePay...</p>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="container" id="mainContent">

        <!-- Language Switch -->
        <button id="langSwitch" class="lang-switch" onclick="toggleLanguage()">
            🇷🇺 🇬🇧
        </button>

        <header class="header">
            <div class="logo-wrapper">
                <div class="logo">🐕</div>
            </div>
            <h1 id="title" class="gradient-text">DogePay</h1>
            <p id="subtitle" class="subtitle">Зарабатывай DOGE с удовольствием</p>
        </header>

        <!-- Balance Card -->
        <div class="balance-card">
            <div class="balance-header">
                <p id="balanceLabel" class="balance-label">ТВОЙ БАЛАНС</p>
            </div>
            <div class="balance-main">
                <span id="balance">0.00000000</span>
                <span class="coin-symbol">🪙</span>
            </div>
            <div class="balance-doge">
                ≈ <span id="balanceDoge">0.0000</span> DOGE
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="buttons-grid">
            <a href="faucet.html" class="btn btn-primary">
                <span class="btn-icon">🚰</span>
                <span id="btnFaucet">Кран</span>
            </a>
            
            <a href="ads.html" class="btn btn-primary">
                <span class="btn-icon">📺</span>
                <span id="btnAds">Реклама</span>
            </a>
            
            <a href="withdraw.html" class="btn btn-secondary">
                <span class="btn-icon">💸</span>
                <span id="btnWithdraw">Вывод</span>
            </a>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p id="footerText">🔐 Безопасно • ⚡ Мгновенно • 🌍 Для всех</p>
        </footer>
    </div>

    <!-- Audio -->
    <audio id="clickSound" src="click.mp3" preload="auto"></audio>
    <audio id="claimSound" src="claim.mp3" preload="auto"></audio>

    <!-- Scripts -->
    <script src="translations.js"></script>
    <script src="app.js"></script>
</body>
</html>
