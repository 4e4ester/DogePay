<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🔐 Админ - DogePay</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <button id="langSwitch" class="lang-switch" onclick="toggleLanguage()">🇷🇺 🇬🇧</button>
        
        <div id="loginForm" class="form-card" style="max-width: 400px; margin: 50px auto;">
            <div class="header">
                <div class="logo">🔐</div>
                <h1 class="gradient-text" data-t="admin_title">Админ Панель</h1>
                <p class="subtitle" data-t="admin_subtitle">Заявки на депозит</p>
            </div>
            <div class="form-group">
                <label class="form-label" data-t="admin_password">Пароль</label>
                <input type="password" id="adminPassword" class="form-input" data-t-placeholder="admin_password_placeholder" placeholder="Введи пароль">
            </div>
            <button id="loginBtn" class="btn btn-primary" style="width: 100%;" data-t="admin_login">Войти</button>
            <p id="loginError" class="message error hidden" style="margin-top: 15px;"></p>
        </div>

        <div id="adminDashboard" class="hidden">
            <div class="header">
                <div class="logo">📊</div>
                <h1 class="gradient-text" data-t="admin_dashboard">Панель управления</h1>
                <p class="subtitle" data-t="admin_subtitle">Заявки на депозит</p>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="totalUsers">0</div>
                    <div class="stat-label" data-t="admin_stats_users">Пользователей</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="pendingRequests">0</div>
                    <div class="stat-label" data-t="admin_stats_pending">На проверке</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="totalDeposits">0</div>
                    <div class="stat-label" data-t="admin_stats_deposits">Всего депозитов</div>
                </div>
            </div>

            <h3 style="margin: 25px 0 15px; color: var(--gold);" data-t="admin_new_requests">Новые заявки</h3>
            <div id="pendingList"></div>

            <h3 style="margin: 25px 0 15px; color: var(--gold);" data-t="admin_approved">Одобрено</h3>
            <div id="approvedList"></div>

            <a href="index.html" class="btn btn-secondary" style="width: 100%; margin-top: 20px;" data-t="admin_back">
                ← На сайт
            </a>
        </div>

        <div class="footer">
            <p>🐕 DogePay • <span data-t="nav_admin">Админ</span></p>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <span class="nav-icon">🏠</span>
            <span data-t="nav_home">Главная</span>
        </a>
        <a href="faucet.html" class="nav-item">
            <span class="nav-icon">🚰</span>
            <span data-t="nav_faucet">Кран</span>
        </a>
        <a href="deposit.html" class="nav-item">
            <span class="nav-icon">💰</span>
            <span data-t="nav_deposit">Ввод</span>
        </a>
        <a href="withdraw.html" class="nav-item">
            <span class="nav-icon">💸</span>
            <span data-t="nav_withdraw">Вывод</span>
        </a>
        <a href="admin.html" class="nav-item active">
            <span class="nav-icon">🔐</span>
            <span data-t="nav_admin">Админ</span>
        </a>
    </nav>

    <script src="translations.js"></script>
    <script src="app.js"></script>
    <script>
        const loginForm = document.getElementById('loginForm');
        const adminDashboard = document.getElementById('adminDashboard');
        const adminPassword = document.getElementById('adminPassword');
        const loginBtn = document.getElementById('loginBtn');
        const loginError = document.getElementById('loginError');

        if (localStorage.getItem('admin_logged') === 'true') {
            showDashboard();
        }

        loginBtn.addEventListener('click', async () => {
            const password = adminPassword.value;
            try {
                const res = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('admin_logged', 'true');
                    showDashboard();
                } else {
                    loginError.innerText = '❌ ' + t('admin_login_error');
                    loginError.classList.remove('hidden');
                }
            } catch (err) {
                loginError.innerText = '❌ Ошибка сети';
                loginError.classList.remove('hidden');
            }
        });

        async function showDashboard() {
            loginForm.classList.add('hidden');
            adminDashboard.classList.remove('hidden');
            await loadRequests();
        }

        async function loadRequests() {
            try {
                const res = await fetch('/api/admin/requests');
                const data = await res.json();
                document.getElementById('totalUsers').innerText = data.stats?.total_users || 0;
                document.getElementById('pendingRequests').innerText = data.stats?.pending || 0;
                document.getElementById('totalDeposits').innerText = data.stats?.total_deposits || 0;
                renderRequests(data.pending, 'pendingList', false);
                renderRequests(data.approved, 'approvedList', true);
            } catch (err) {
                console.error('Ошибка загрузки:', err);
            }
        }

        function renderRequests(requests, elementId, isApproved) {
            const container = document.getElementById(elementId);
            container.innerHTML = '';
            if (!requests || requests.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: var(--text-secondary);" data-t="admin_no_requests">Нет заявок</p>';
                return;
            }
            requests.forEach(req => {
                const item = document.createElement('div');
                item.className = 'request-item';
                item.innerHTML = `
                    <div class="request-header">
                        <span style="font-weight: 700; color: var(--text-primary);">User: ${req.user_id}</span>
                        <span class="request-status ${isApproved ? 'status-approved' : 'status-pending'}">
                            ${isApproved ? '✅ Одобрено' : '⏳ На проверке'}
                        </span>
                    </div>
                    <div class="request-details">
                        <p>💰 Сумма: <strong style="color: var(--gold);">${req.amount} DOGE</strong></p>
                        <p>🪙 Монет: <strong style="color: var(--gold);">${req.amount * 1000} 🪙</strong></p>
                        <p>📝 TX: <code style="background: var(--bg-secondary); padding: 5px 10px; border-radius: 8px; font-size: 12px;">${req.tx_hash.substring(0, 20)}...</code></p>
                        <p>🕐 Дата: ${new Date(req.created_at).toLocaleString('ru-RU')}</p>
                    </div>
                    ${!isApproved ? `
                    <div class="request-actions">
                        <button class="btn btn-approve" onclick="approveRequest(${req.id})">✅ Одобрить</button>
                        <button class="btn btn-reject" onclick="rejectRequest(${req.id})">❌ Отклонить</button>
                    </div>
                    ` : ''}
                `;
                container.appendChild(item);
            });
        }

        window.approveRequest = async (id) => {
            if (!confirm('Одобрить этот депозит?')) return;
            try {
                const res = await fetch('/api/admin/approve', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ request_id: id })
                });
                const data = await res.json();
                if (data.success) {
                    alert('✅ Депозит одобрен!');
                    loadRequests();
                } else {
                    alert('❌ Ошибка: ' + data.error);
                }
            } catch (err) {
                alert('❌ Ошибка сети');
            }
        };

        window.rejectRequest = async (id) => {
            if (!confirm('Отклонить этот депозит?')) return;
            try {
                const res = await fetch('/api/admin/reject', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ request_id: id })
                });
                const data = await res.json();
                if (data.success) {
                    alert('❌ Депозит отклонён');
                    loadRequests();
                } else {
                    alert('❌ Ошибка: ' + data.error);
                }
            } catch (err) {
                alert('❌ Ошибка сети');
            }
        };
    </script>
</body>
</html>
