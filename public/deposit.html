<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💰 Ввод - DogePay</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <button id="langSwitch" class="lang-switch" onclick="toggleLanguage()">🇷🇺 🇬🇧</button>
        
        <div class="header">
            <div class="logo">💰</div>
            <h1 class="gradient-text" data-t="deposit_title">Ввод DOGE</h1>
            <p class="subtitle" data-t="deposit_subtitle">Пополни баланс</p>
        </div>

        <div class="form-card">
            <div class="form-group">
                <label class="form-label" data-t="deposit_label">Сумма в DOGE</label>
                <input type="number" id="amount" class="form-input" data-t-placeholder="deposit_placeholder" placeholder="Минимум 10 DOGE" step="0.01" min="10">
                <p class="conversion" id="conversion">10 DOGE = 10000 🪙</p>
            </div>

            <div class="form-group">
                <label class="form-label" data-t="deposit_tx_label">TX Hash</label>
                <input type="text" id="txHash" class="form-input" data-t-placeholder="deposit_tx_placeholder" placeholder="Вставь хеш транзакции">
                <p class="form-hint" data-t="deposit_tx_hint">Найди TX Hash в кошельке после отправки</p>
            </div>

            <button id="depositBtn" class="btn btn-primary" style="width: 100%;">
                <span data-t="deposit_btn">Отправить на проверку</span>
            </button>

            <div class="info-box">
                <p data-t="deposit_info">Проверка: 5-30 минут
Мин. депозит: 10 DOGE
Курс: 1 DOGE = 1000 🪙</p>
            </div>
        </div>

        <div class="footer">
            <p>🐕 DogePay • <span data-t="nav_deposit">Ввод</span></p>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <span class="nav-icon">🏠</span>
            <span data-t="nav_home">Главная</span>
        </a>
        <a href="faucet.html" class="nav-item">
            <span class="nav-icon">🚰</span>
            <span data-t="nav_faucet">Кран</span>
        </a>
        <a href="deposit.html" class="nav-item active">
            <span class="nav-icon">💰</span>
            <span data-t="nav_deposit">Ввод</span>
        </a>
        <a href="withdraw.html" class="nav-item">
            <span class="nav-icon">💸</span>
            <span data-t="nav_withdraw">Вывод</span>
        </a>
        <a href="admin.html" class="nav-item">
            <span class="nav-icon">🔐</span>
            <span data-t="nav_admin">Админ</span>
        </a>
    </nav>

    <script src="translations.js"></script>
    <script src="app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const userId = tg.initDataUnsafe?.user?.id;

        const amountInput = document.getElementById('amount');
        const txHashInput = document.getElementById('txHash');
        const depositBtn = document.getElementById('depositBtn');
        const conversionEl = document.getElementById('conversion');

        amountInput.addEventListener('input', () => {
            const amount = parseFloat(amountInput.value) || 0;
            const coins = Math.floor(amount * 1000);
            conversionEl.innerText = `${amount} DOGE = ${coins.toLocaleString('ru-RU')} 🪙`;
        });

        depositBtn.addEventListener('click', async () => {
            if (!userId) {
                showMessage(t('error_user'), 'error');
                return;
            }

            const amount = parseFloat(amountInput.value);
            const txHash = txHashInput.value.trim();

            if (!amount || amount < 10) {
                showMessage('❌ Минимум 10 DOGE', 'error');
                return;
            }

            if (!txHash || txHash.length < 10) {
                showMessage('❌ Введи TX Hash', 'error');
                return;
            }

            depositBtn.disabled = true;
            depositBtn.innerHTML = '⏳ Отправка...';

            try {
                const res = await fetch('/api/deposit-request', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId, amount, tx_hash: txHash })
                });
                const data = await res.json();

                if (data.success) {
                    showMessage('✅ ' + data.message, 'success');
                    playClaim();
                    amountInput.value = '';
                    txHashInput.value = '';
                    setTimeout(() => window.location.href = 'index.html', 2500);
                } else {
                    showMessage('❌ ' + data.error, 'error');
                    depositBtn.disabled = false;
                    depositBtn.innerHTML = `<span data-t="deposit_btn">Отправить на проверку</span>`;
                }
            } catch (err) {
                showMessage(t('error_network'), 'error');
                depositBtn.disabled = false;
                depositBtn.innerHTML = `<span data-t="deposit_btn">Отправить на проверку</span>`;
            }
        });
    </script>
</body>
</html>
