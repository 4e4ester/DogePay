<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💸 Вывод - DogePay</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <button id="langSwitch" class="lang-switch" onclick="toggleLanguage()">🇷🇺 🇬🇧</button>
        
        <div class="header">
            <div class="logo">💸</div>
            <h1 class="gradient-text" data-t="withdraw_title">Вывод DOGE</h1>
            <p class="subtitle" data-t="withdraw_subtitle">Выведи на кошелёк</p>
        </div>

        <div class="form-card">
            <div class="form-group">
                <label class="form-label" data-t="withdraw_wallet_label">Твой DOGE кошелёк</label>
                <input type="text" id="wallet" class="form-input" data-t-placeholder="withdraw_wallet_placeholder" placeholder="Адрес кошелька">
            </div>

            <div class="form-group">
                <label class="form-label" data-t="withdraw_amount_label">Сумма в 🪙</label>
                <input type="number" id="amount" class="form-input" data-t-placeholder="withdraw_amount_placeholder" placeholder="Минимум 10000 🪙 (10 DOGE)" step="100" min="10000">
                <p class="conversion" id="conversion">10000 🪙 = 10 DOGE</p>
            </div>

            <div class="wallet-display">
                <span data-t="withdraw_balance">Твой баланс:</span> <strong id="currentBalance" style="color: var(--gold);">0</strong> 🪙
            </div>

            <p style="color: var(--error); font-size: 13px; text-align: center; margin: 15px 0;" data-t="withdraw_warning">
                ⚠️ Проверяй адрес! Транзакции необратимы.
            </p>

            <button id="withdrawBtn" class="btn btn-primary" style="width: 100%;">
                <span data-t="withdraw_btn">Запросить вывод</span>
            </button>

            <div class="info-box">
                <p data-t="withdraw_info">Мин. вывод: 10000 🪙
Обработка: до 24 часов</p>
            </div>
        </div>

        <div class="footer">
            <p>🐕 DogePay • <span data-t="nav_withdraw">Вывод</span></p>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <span class="nav-icon">🏠</span>
            <span data-t="nav_home">Главная</span>
        </a>
        <a href="faucet.html" class="nav-item">
            <span class="nav-icon">🚰</span>
            <span data-t="nav_faucet">Кран</span>
        </a>
        <a href="deposit.html" class="nav-item">
            <span class="nav-icon">💰</span>
            <span data-t="nav_deposit">Ввод</span>
        </a>
        <a href="withdraw.html" class="nav-item active">
            <span class="nav-icon">💸</span>
            <span data-t="nav_withdraw">Вывод</span>
        </a>
        <a href="admin.html" class="nav-item">
            <span class="nav-icon">🔐</span>
            <span data-t="nav_admin">Админ</span>
        </a>
    </nav>

    <script src="translations.js"></script>
    <script src="app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const userId = tg.initDataUnsafe?.user?.id;

        const walletInput = document.getElementById('wallet');
        const amountInput = document.getElementById('amount');
        const withdrawBtn = document.getElementById('withdrawBtn');
        const conversionEl = document.getElementById('conversion');
        const currentBalanceEl = document.getElementById('currentBalance');

        async function loadCurrentBalance() {
            if (!userId) return;
            try {
                const res = await fetch(`/api/balance?user_id=${userId}`);
                const data = await res.json();
                if (currentBalanceEl) {
                    currentBalanceEl.innerText = (data.balance || 0).toLocaleString('ru-RU');
                }
            } catch (err) {
                console.error('Ошибка загрузки баланса:', err);
            }
        }

        amountInput.addEventListener('input', () => {
            const coins = parseFloat(amountInput.value) || 0;
            const doge = (coins / 1000).toFixed(2);
            conversionEl.innerText = `${coins.toLocaleString('ru-RU')} 🪙 = ${doge} DOGE`;
        });

        withdrawBtn.addEventListener('click', async () => {
            if (!userId) {
                showMessage(t('error_user'), 'error');
                return;
            }

            const wallet = walletInput.value.trim();
            const amount = parseFloat(amountInput.value);

            if (!wallet || wallet.length < 10) {
                showMessage('❌ Введи корректный адрес кошелька', 'error');
                return;
            }

            if (!amount || amount < 10000) {
                showMessage('❌ Минимум 10000 🪙 (10 DOGE)', 'error');
                return;
            }

            withdrawBtn.disabled = true;
            withdrawBtn.innerHTML = '⏳ Обработка...';

            try {
                const res = await fetch('/api/withdraw', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId, amount, wallet })
                });
                const data = await res.json();

                if (data.success) {
                    showMessage('✅ ' + data.message, 'success');
                    playClaim();
                    walletInput.value = '';
                    amountInput.value = '';
                    conversionEl.innerText = '10000 🪙 = 10 DOGE';
                    loadCurrentBalance();
                    if (window.updateBalance) window.updateBalance();
                    setTimeout(() => window.location.href = 'index.html', 2500);
                } else {
                    showMessage('❌ ' + data.error, 'error');
                    withdrawBtn.disabled = false;
                    withdrawBtn.innerHTML = `<span data-t="withdraw_btn">Запросить вывод</span>`;
                }
            } catch (err) {
                showMessage(t('error_network'), 'error');
                withdrawBtn.disabled = false;
                withdrawBtn.innerHTML = `<span data-t="withdraw_btn">Запросить вывод</span>`;
            }
        });

        loadCurrentBalance();
    </script>
</body>
</html>
