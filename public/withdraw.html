<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💸 Вывод - DogePay</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- НЕТ ФЛАГОВ -->
        
        <div class="header">
            <div class="logo">💸</div>
            <h1 class="gradient-text">Вывод DOGE</h1>
            <p class="subtitle">Выведи на свой кошелёк</p>
        </div>

        <div class="form-card">
            <div class="form-group">
                <label class="form-label">Твой DOGE кошелёк</label>
                <input type="text" id="wallet" class="form-input" placeholder="Адрес кошелька (например: DD5...)">
            </div>

            <div class="form-group">
                <label class="form-label">Сумма в 🪙</label>
                <input type="number" id="amount" class="form-input" placeholder="Минимум 10000 🪙 (10 DOGE)" step="100" min="10000">
                <p class="conversion" id="conversion">10000 🪙 = 10 DOGE</p>
            </div>

            <div class="wallet-display">
                Твой баланс: <strong id="currentBalance" style="color: var(--gold);">0</strong> 🪙
            </div>

            <p style="color: var(--error); font-size: 13px; text-align: center; margin: 15px 0;">
                ⚠️ Проверяй адрес! Транзакции необратимы.
            </p>

            <button id="withdrawBtn" class="btn btn-primary" style="width: 100%;">
                Запросить вывод
            </button>

            <div class="info-box">
                <p>💡 Мин. вывод: 10000 🪙</p>
                <p>⏱ Обработка: до 24 часов</p>
            </div>
        </div>

        <div class="footer">
            <p>🐕 DogePay • Вывод</p>
        </div>
    </div>

    <!-- НИЖНЕЕ МЕНЮ (3 КНОПКИ) -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <span class="nav-icon">🏠</span>
            <span>Главная</span>
        </a>
        <a href="faucet.html" class="nav-item">
            <span class="nav-icon">🚰</span>
            <span>Кран</span>
        </a>
        <a href="withdraw.html" class="nav-item active">
            <span class="nav-icon">💸</span>
            <span>Вывод</span>
        </a>
    </nav>

    <script src="app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const userId = tg.initDataUnsafe?.user?.id;

        const walletInput = document.getElementById('wallet');
        const amountInput = document.getElementById('amount');
        const withdrawBtn = document.getElementById('withdrawBtn');
        const conversionEl = document.getElementById('conversion');
        const currentBalanceEl = document.getElementById('currentBalance');

        async function loadCurrentBalance() {
            if (!userId) return;
            try {
                const res = await fetch(`/api/balance?user_id=${userId}`);
                const data = await res.json();
                if (currentBalanceEl) {
                    currentBalanceEl.innerText = (data.balance || 0).toLocaleString('ru-RU');
                }
            } catch (err) {
                console.error('Ошибка загрузки баланса:', err);
            }
        }

        amountInput.addEventListener('input', () => {
            const coins = parseFloat(amountInput.value) || 0;
            const doge = (coins / 1000).toFixed(2);
            conversionEl.innerText = `${coins.toLocaleString('ru-RU')} 🪙 = ${doge} DOGE`;
        });

        withdrawBtn.addEventListener('click', async () => {
            if (!userId) {
                showMessage('❌ Пользователь не найден', 'error');
                return;
            }

            const wallet = walletInput.value.trim();
            const amount = parseFloat(amountInput.value);

            if (!wallet || wallet.length < 10) {
                showMessage('❌ Введи корректный адрес кошелька', 'error');
                return;
            }

            if (!amount || amount < 10000) {
                showMessage('❌ Минимум 10000 🪙 (10 DOGE)', 'error');
                return;
            }

            withdrawBtn.disabled = true;
            withdrawBtn.innerHTML = '⏳ Обработка...';

            try {
                const res = await fetch('/api/withdraw', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId, amount, wallet })
                });
                const data = await res.json();

                if (data.success) {
                    showMessage('✅ ' + data.message, 'success');
                    playClaim();
                    walletInput.value = '';
                    amountInput.value = '';
                    conversionEl.innerText = '10000 🪙 = 10 DOGE';
                    loadCurrentBalance();
                    if (window.updateBalance) window.updateBalance();
                    setTimeout(() => window.location.href = 'index.html', 2500);
                } else {
                    showMessage('❌ ' + data.error, 'error');
                    withdrawBtn.disabled = false;
                    withdrawBtn.innerHTML = 'Запросить вывод';
                }
            } catch (err) {
                showMessage('❌ Ошибка сети', 'error');
                withdrawBtn.disabled = false;
                withdrawBtn.innerHTML = 'Запросить вывод';
            }
        });

        loadCurrentBalance();
    </script>
</body>
</html>
